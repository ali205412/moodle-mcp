name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.2"
  MOODLE_PLUGIN_CI_VERSION: "^4"

jobs:
  phpunit:
    name: PHPUnit (${{ matrix.moodle-branch }}, ${{ matrix.database }})
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          - moodle-branch: MOODLE_402_STABLE
            database: mariadb
            node-version: "20.20.2"
          - moodle-branch: MOODLE_402_STABLE
            database: pgsql
            node-version: "20.20.2"
          - moodle-branch: MOODLE_403_STABLE
            database: mariadb
            node-version: "22.11.0"
          - moodle-branch: MOODLE_403_STABLE
            database: pgsql
            node-version: "22.11.0"
          - moodle-branch: MOODLE_404_STABLE
            database: mariadb
            node-version: "22.11.0"
          - moodle-branch: MOODLE_404_STABLE
            database: pgsql
            node-version: "22.11.0"
          - moodle-branch: MOODLE_405_STABLE
            database: mariadb
            node-version: "22.11.0"
          - moodle-branch: MOODLE_405_STABLE
            database: pgsql
            node-version: "22.11.0"

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, mbstring, mysqli, pdo_mysql, pgsql, pdo_pgsql, soap, zip, gd, exif, opcache
          ini-values: max_input_vars=5000
          coverage: none

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_PLUGIN_CI_VERSION }}
          echo "$(cd ci/bin && pwd)" >> "${GITHUB_PATH}"
          echo "$(cd ci/vendor/bin && pwd)" >> "${GITHUB_PATH}"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=${HOME}/.nvm" >> "${GITHUB_ENV}"

      - name: Install moodle-plugin-ci
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: Validate Plugin Structure
        run: moodle-plugin-ci validate

      - name: Check Upgrade Savepoints
        run: moodle-plugin-ci savepoints

      - name: PHPUnit tests
        run: moodle-plugin-ci phpunit --fail-on-warning

  quality:
    name: Quality (MOODLE_405_STABLE)
    runs-on: ubuntu-22.04

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, mbstring, mysqli, pdo_mysql, soap, zip, gd, exif, opcache
          ini-values: max_input_vars=5000
          coverage: none

      - name: Setup Node 22.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_PLUGIN_CI_VERSION }}
          echo "$(cd ci/bin && pwd)" >> "${GITHUB_PATH}"
          echo "$(cd ci/vendor/bin && pwd)" >> "${GITHUB_PATH}"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=${HOME}/.nvm" >> "${GITHUB_ENV}"

      - name: Install moodle-plugin-ci
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: mariadb
          MOODLE_BRANCH: MOODLE_405_STABLE

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs --runtime-set ignore_warnings_on_exit 1

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate Plugin Structure
        run: moodle-plugin-ci validate

      - name: Check Upgrade Savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        run: moodle-plugin-ci mustache

      - name: Grunt
        run: moodle-plugin-ci grunt --max-lint-warnings 0

  branch-gate:
    name: Branch Gate
    runs-on: ubuntu-latest
    needs:
      - phpunit
      - quality
    if: ${{ always() }}

    steps:
      - name: Verify upstream jobs succeeded
        run: |
          if [ "${{ needs.phpunit.result }}" != "success" ] || [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Required CI jobs did not succeed."
            echo "phpunit=${{ needs.phpunit.result }}"
            echo "quality=${{ needs.quality.result }}"
            exit 1
          fi
