name: Moodle Plugin Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.6.0. Leave empty to use version.php."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(
            sed -n "s/^\$plugin->release = '\(.*\)';/\1/p" version.php | head -n1
          )"
          if [ -z "${VERSION}" ]; then
            VERSION="$(
              sed -n "s/^\$plugin->version = \([0-9][0-9]*\);/\1/p" version.php | head -n1
            )"
          fi
          if [ -z "${VERSION}" ]; then
            echo "Could not determine plugin version from version.php" >&2
            exit 1
          fi
          TAG="${INPUT_TAG:-${REF_NAME}}"
          if [ -z "${TAG}" ]; then
            TAG="v${VERSION}"
          fi
          EXPECTED_TAG="v${VERSION}"
          if [ "${TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${TAG} does not match version.php release ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag for manual releases
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on origin."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Build Moodle plugin package
        id: package
        run: |
          PACKAGE_PATH="$(bash scripts/package-release.sh)"
          echo "package=${PACKAGE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: webservice_mcp-${{ steps.meta.outputs.version }}
          path: ${{ steps.package.outputs.package }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: ${{ steps.package.outputs.package }}
          body: |
            Moodle MCP plugin release `${{ steps.meta.outputs.version }}`.

            Packaged asset:
            - `webservice_mcp-${{ steps.meta.outputs.version }}.zip`

            This ZIP is built from the plugin root and packaged with the Moodle plugin directory name `mcp/`.
          draft: false
          prerelease: false
